<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="front-body">
    <header>
        <h1 class="text-center titulo-principal">Alke Wallet</h1>
    </header>
    <main class="front-main">
        <div class="container">
            <div class="row">
                <div id="mensaje"></div>
                <form id="registro">

                    <div class="mt-5 mx-auto">
                        <label for="Nombre" class="form-label">Nombre completo:</label>
                        <input type="text" name="nombre" class="form-control" id="nombre"
                            placeholder="Ingrese su nombre">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="usuario" class="form-label">usuario:</label>
                        <input type="text" name="usuario" class="form-control" id="usuario"
                            placeholder="Ingrese su usuario">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="password" class="form-label">Contraseña:</label>
                        <input type="password" name="password" class="form-control" id="password"
                            placeholder="Ingrese contraseña">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="password-confirmar" class="form-label">Confirmar contraseña:</label>
                        <input type="password" name="confirmar_password" class="form-control" id="confirmar_password"
                            placeholder="Reingrese contraseña">
                    </div>
                    <div class="mt-5 mb-5 text-center mx-auto">
                        <button type="submit" class="btn btn-primary">
                            Registrarse
                        </button>
                    </div>


                </form>
                <div class="text-center mt-3">
                    <a href="login.html">Ya estas registrado? ingresa</a>
                </div>
            </div>



    </main>
    <script>
        document.getElementById("registro").addEventListener("submit", function (event) {
            event.preventDefault();
            

            const nombre = document.getElementById("nombre").value;
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;
            const confirmarPassword = document.getElementById("confirmar_password").value;

            if (password !== confirmarPassword) {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Las contraseñas no coinciden.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                return;
            }

            const nuevoUsuario = {
                nombre,
                usuario,
                password
            }

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            
            usuarios.push(nuevoUsuario);

            localStorage.setItem("usuarios", JSON.stringify(usuarios));

            document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Registro exitoso. Redirigiendo...
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

            setTimeout(() => {
                window.location.href = "login.html";
            }, 3000);

        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



</body>

</html>
<!--script para register.html-->
