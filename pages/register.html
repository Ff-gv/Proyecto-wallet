<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/styles-login.css">
</head>

<body>
    <header>
        <h1 class="text-center">Alke Wallet</h1>
    </header>
    <main>
        <div class="container">
            <div row>
                <form action="" class="registro ">

                    <div class="mt-5 mx-auto">
                        <label for="Nombre" class="form-label">Nombre completo:</label>
                        <input type="text" name="nombre" class="form-control" id="nombre"
                            placeholder="Ingrese su nombre">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="usuario" class="form-label">usuario:</label>
                        <input type="text" name="usuario" class="form-control" id="usuario"
                            placeholder="Ingrese su usuario">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="password" class="form-label">Contraseña:</label>
                        <input type="password" name="password" class="form-control" id="password"
                            placeholder="Ingrese contraseña">
                    </div>
                    <div class="mt-2 mx-auto">
                        <label for="password-confirmar" class="form-label">Confirmar contraseña:</label>
                        <input type="password" name="confirmar_password" class="form-control" id="confirmar_password"
                            placeholder="Reingrese contraseña">
                    </div>
            </div>
            <div class="mt-5 mb-5 text-center">
                <button class="btn btn-primary">
                    Registrarse
                </button>
            </div>
            <div class="text-center mt-3">
                <a href="../pages/login.html">Ya estas registrado? ingresa</a>
            </div>
        </div>


        </form>





        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </main>




</body>

</html>
