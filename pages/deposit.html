<!DOCTYPE html>
<html>

<head>
    <title>Wallet - Depositar</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>

<body>
    <header class="head-back">
        <nav class="navbar navbar-expand-md position-relative py-3">
            <div class="position-absolute start-0 top-0 me-3 mt-2">
                <button class="btn border-0"><a href="../pages/main.html"><i
                            class="fa-solid fa-arrow-left flecha-volver"></i></a></button>
            </div>
            <div class="container d-flex justify-content-center">
                <ul class="navbar-nav flex-column text-center list-unstyled mb-0">
                    <li class="navbar-text d-flex mx-auto "></li>
                    <li class="nav-item">
                        <a href="" class="nav-link p-0">

                        </a>
                    </li>
                    <div class="navbar-text d-flex mx-auto ">Lorem ipsum dolor sit amet.</div>
                </ul>
            </div>
            <div class="position-absolute end-0 top-0 me-3 mt-2">
                <button class="btn btn-primary" id="logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
        </nav>
    </header>
    <main>
        <div class="text-center mt-3 mb-2 titulo">
            <h1 class="dinero">0</h1>
        </div>
        <h2 class="text-center">Dinero a Transferir</h2>
        <div class="container">
            <form action="" class="text-center mt-3  mx-auto" id="form-dinero">
                <div class="input-group form-control-lg mx-auto flex-nowrap">
                    <div class="input-group-text">$</div>
                    <input type="text" class="form-control" id="dinero">
                </div>
                <div class="enviar-dinero mt-4 text-center">
                    <button type="submit" class="btn btn-outline-dark btn-lg">Enviar dinero</button>
                </div>

            </form>
            <div class="mt-5 text-center mx-auto">
                <div class="btn-group btn-group-lg d-flex w-100 btn-grupo-transferir" role="group"
                    aria-label="Large button group">
                    <button type="button" class="btn btn-outline-dark">$1.000</button>
                    <button type="button" class="btn btn-outline-dark">$5.000</button>
                    <button type="button" class="btn btn-outline-dark">$10.000</button>
                </div>
                <br>
                <div class="btn-group btn-group-lg mt-1 d-flex w-100 btn-grupo-transferir" role="group"
                    aria-label="Large button group">
                    <button type="button" class="btn btn-outline-dark">$20.000</button>
                    <button type="button" class="btn btn-outline-dark">$50.000</button>
                    <button type="button" class="btn btn-outline-dark">$100.000</button>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
            <script src="../assets/js/script.js"></script>
            <script>
                document.getElementById("form-dinero").addEventListener("submit", function (event) {
                    event.preventDefault();

                    const depositoTexto = document.getElementById("dinero").value;

                    if (depositoTexto <= 0) {
                        alert("numero debe ser mayor a 0");
                        return;
                    }

                    /*verdadero es todo numero no entero*/
                    if (!Number.isInteger(Number(depositoTexto))) {
                        alert("ingrese numeros enteros")
                        return;
                    }

                    const depositoNumero = Number(depositoTexto);
                    /* se agrega a saldoActual el valor de saldo, o si es null se agrega 0*/
                    let saldoActual = Number(localStorage.getItem("saldo")) || 0;
                    /*se realiza suma simple entre esas 2 variables*/
                    let nuevoSaldo = saldoActual + depositoNumero;
                    /*se agrega dentro del item de localstorage, bajo saldo, el valor de nuevoSaldo*/
                    localStorage.setItem("saldo", nuevoSaldo);

                    alert("¡Dinero depositado con éxito!");

                    window.location.href = "../pages/main.html";
                })
            </script>
</body>


</html>
