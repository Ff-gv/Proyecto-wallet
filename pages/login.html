<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-alke-wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="front-body">
    <header>
        <h1 class="text-center mt-3 titulo-principal">Alke Wallet</h1>
        <div class="top-info">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-8 text-center">
                        <i class="fa-solid fa-coins" id="moneda"></i>
                    </div>

                    <div class="col-8 text-center">
                        <h1 id="texto-iniciar-sesion">Iniciar sesión</h1>
                    </div>
                    <div class="col-8 text-center">
                        <p class="texto-inicio">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur,
                            harum!</p>
                    </div>

                </div>
            </div>
        </div>
    </header>

    <main class="front-main">
        <section class="login-bar">
            <div class="container">
                <div class="row justify-content-center">
                    <div id="mensaje"></div>
                    <form class="col-lg-4 col-6 text-center" id="login">
                        <div class="form-floating caja-email mb-2">
                            <input type="text" class="form-control" id="usuario-l" placeholder="usuario">
                            <label for="usuario" class="label-inicio">Usuario</label>
                        </div>
                        <div class="form-floating caja-contraseña">
                            <input type="text" class="form-control" id="password-l" placeholder="contraseña">
                            <label for="contraseña" class="label-inicio">contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-iniciar btn-lg">Iniciar sesión</button>
                        <div class="clave"><a href="">Olvidaste tu clave?</a></div>

                        <p class="texto-inicio">-o-</p>

                    </form>
                </div>
                <div class="row">
                    <div class="col-12 text-center login-accounts">
                        <div><a href=""><i class="fa-brands fa-google"></i>Continuar con Google</a></div>
                        <div><a href=""><i class="fa-brands fa-apple"></i>Continuar con Apple</a></div>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <div class="container">
            <div class="row justify-content-center">
                <div class="text-center text-nowrap">
                    <p>No tienes una cuenta? <a href="../pages/register.html">Registrate ahora!</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
        document.getElementById("login").addEventListener("submit", function (event) {
            event.preventDefault();

            const usuario = document.getElementById("usuario-l").value;
            const password = document.getElementById("password-l").value;

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            const usuarioEncontrado = usuarios.find(function (user) {
                return user.usuario === usuario && user.password === password;
            });

            if (usuarioEncontrado) {
                localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioEncontrado));

                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Inicio de sesión exitoso.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = "main.html"
                }, 3000);
            } else {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Usuario y/o contraseña incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    document.getElementById("mensaje").innerHTML = "";
                }, 3000);
            }


        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
