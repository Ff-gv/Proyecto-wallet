<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
    <header class="head-back">
        <nav class="navbar navbar-expand-md ">
            <div class="container">
                <a href="" class="navbar-brand" id="icono-principal"><i class="fa-solid fa-money-bill-trend-up"></i></a>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                    <div class="navbar-toggler-icon"></div>
                </button>
                <div class="collapse navbar-collapse" id="nav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="../pages/transaction.html" class="nav-link"><i
                                    class="fa-solid fa-money-bill-transfer"></i>Transacciones</a>
                        </li>
                        <li class="nav-item">
                            <a href="../pages/sendmoney.html" class="nav-link"><i
                                    class="fa-solid fa-money-bill-wave"></i>Enviar dinero</a>
                        </li>
                        <li class="nav-item">
                            <a href="deposit.html" class="nav-link"><i class="fa-solid fa-user-group"></i>Depositar</a>
                        </li>
                    </ul>

                </div>
                <div class="">
                    <button class="btn btn-primary" id="logout">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </div>
            </div>

        </nav>

    </header>
    <main>
        <h1 class="m-3 text-center">Balance</h1>
        <div class="container">
            <div>
                <div class="card text-bg-dark mb-1 saldo-card mx-auto">
                    <div class="card-header">Saldo disponible</div>
                    <div class="card-body">
                        <span class="saldo"></span>
                        <p>Tu saldo actual</p>
                    </div>
                </div>

            </div>
        </div>
        <div class="d-flex justify-content-center">
            <div class="card text-bg-info mb-1 img-card">
                <img class="card-img-top" src="../assets/img/lineplot-seaborn.png"></img>
            </div>
        </div>
        </div>



    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>

        const saldo = Number(localStorage.getItem("saldo")) || 0;

        document.querySelector(".saldo").textContent = "$" + saldo.toLocaleString("es-CL");


        const usuarioLogueado = localStorage.getItem("usuarioLogueado");

        if (!usuarioLogueado) {
            window.location.href = "login.html";
        }

    </script>

    <script src="../assets/js/script.js"></script>
</body>


</html>
